<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>code-challenges</title>
        <!--
      GitHub Pages serves this file for any path it doesn't recognize as a static
      asset. It encodes the attempted path into a query string and redirects to
      the app root, where the decode script in index.html restores it before
      React Router mounts — so deep links resolve to the in-app 404 page instead
      of GitHub's. See https://github.com/rafgraph/spa-github-pages.
    -->
        <script>
            var pathSegmentsToKeep = 1;
            var l = window.location;
            l.replace(
                l.protocol +
                    '//' +
                    l.hostname +
                    (l.port ? ':' + l.port : '') +
                    l.pathname
                        .split('/')
                        .slice(0, 1 + pathSegmentsToKeep)
                        .join('/') +
                    '/?/' +
                    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash
            );
        </script>
    </head>
    <body></body>
</html>
